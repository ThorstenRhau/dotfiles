"$schema" = "https://starship.rs/config-schema.json"

add_newline     = true
command_timeout = 500
right_format    = "$cmd_duration"

[character]
error_symbol   = "[ÔØ»ÔØ»](bold red)"
success_symbol = "[ÔØ»ÔØ»](bold green)"

[hostname]
format     = "[$hostname ¯ó▒ ](bold yellow)"
ssh_only   = true
ssh_symbol = "¯ó▒ "

[username]
detect_env_vars = ["SSH_CLIENT", "SSH_CONNECTION", "SSH_TTY", "SUDO_USER"]
format          = "[$user]($style) "
show_always     = false
style_root      = "red bold"
style_user      = "green bold"

[git_branch]
symbol = "´Éÿ "

